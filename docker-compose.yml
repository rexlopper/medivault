services:
  postgres:
    image: postgres:18
    container_name: medivault_postgres
    environment:
      POSTGRES_DB: medivault_records_admin
      POSTGRES_USER: rexlopper
      POSTGRES_PASSWORD: bryitkids
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rexlopper -d medivault_records_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: medivault_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medivault.app
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: medivault_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  records_service:
    build:
      context: ./back_end/records_service
    container_name: medivault_records_service
    environment:
      DATABASE_URL: postgresql+psycopg://rexlopper:bryitkids@postgres:5432/medivault_records_admin
      POSTGRES_USER: rexlopper
      POSTGRES_PASSWORD: bryitkids
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: medivault_records_admin
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  patient_summary_service:
    build:
      context: ./back_end/patient_summary_service
    container_name: medivault_patient_summary_service
    environment:
      DATABASE_URL: postgresql+psycopg://rexlopper:bryitkids@postgres:5432/medivault_records_admin
      POSTGRES_USER: rexlopper
      POSTGRES_PASSWORD: bryitkids
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: medivault_records_admin
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      records_service:
        condition: service_started

  attachment_service:
    build:
      context: ./back_end/attachment_service
    container_name: medivault_attachment_service
    environment:
      DATABASE_URL: postgresql+psycopg://rexlopper:bryitkids@postgres:5432/medivault_records_admin
      POSTGRES_USER: rexlopper
      POSTGRES_PASSWORD: bryitkids
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: medivault_records_admin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: medivault-attachments
      MINIO_SECURE: "false"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      records_service:
        condition: service_started
      minio:
        condition: service_started

  consult_orchestration_service:
    build:
      context: ./back_end/consult_orchestration_service
    container_name: medivault_consult_orchestration_service
    environment:
      DATABASE_URL: postgresql+psycopg://rexlopper:bryitkids@postgres:5432/medivault_records_admin
      POSTGRES_USER: rexlopper
      POSTGRES_PASSWORD: bryitkids
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: medivault_records_admin
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      records_service:
        condition: service_started

  frontend:
    build:
      context: ./front_end
    container_name: medivault_frontend
    ports:
      - "8080:80"
    depends_on:
      - records_service
      - patient_summary_service
      - attachment_service
      - consult_orchestration_service

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
